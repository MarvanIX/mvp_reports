<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MVP Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid py-2">

        <!-- 🔹 LEFT: Brand -->
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            MVP Reports
        </a>

        <!-- 🔹 CENTER: Navigation -->
        <ul class="navbar-nav position-absolute start-50 translate-middle-x gap-4">

            <li class="nav-item">
                <a class="nav-link fw-semibold {% if request.resolver_match.url_name == 'company' %}active text-primary{% endif %}"
                   href="{% url 'company' %}">
                    Company
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link fw-semibold {% if request.resolver_match.url_name == 'manager_reports' %}active text-primary{% endif %}"
                   href="{% url 'manager_reports' %}">
                    Reports
                </a>
            </li>

        </ul>

        <!-- 🔹 RIGHT: User Info -->
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-muted small">
                {{ request.user.email }}
            </span>

            <a class="btn btn-outline-secondary btn-sm"
               href="{% url 'login' %}">
                Logout
            </a>
        </div>

    </div>
</nav>

<!-- 🔷 PAGE CONTENT -->
<div class="container py-5">
    {% block content %}
    {% endblock %}
    {% block scripts %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
