{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Report for {{ company.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            min-height: 100vh;
            padding: 60px 15px;
        }
        .report-card {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
            border-radius: 0.75rem;
            background-color: #ffffff;
        }
        .report-card h2 {
            margin-bottom: 0.5rem;
        }
        .report-card p {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="card report-card">
    <h2 class="text-center fw-bold">Submit a Report</h2>
    <p class="text-center text-muted">for <strong>{{ company }}</strong></p>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label for="title" class="form-label">Report Title</label>
            <input type="text" class="form-control" name="title" id="title" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" name="description" id="description" rows="4" required></textarea>
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="is_anonymous" id="is_anonymous" checked>
            <label class="form-check-label" for="is_anonymous">
                Submit anonymously
            </label>
        </div>
        <div class="mb-3" id="emailField" style="display: none;">
            <label for="email" class="form-label">Your Email (Optional)</label>
            <input type="email" class="form-control" name="email" id="email">
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit Report</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const checkbox = document.getElementById("is_anonymous");
    const emailField = document.getElementById("emailField");
    const emailInput = document.getElementById("email");

    function toggleEmailField() {
        if (checkbox.checked) {
            emailField.style.display = "none";
            emailInput.removeAttribute("required");
            emailInput.value = "";
        } else {
            emailField.style.display = "block";
            emailInput.setAttribute("required", "required");
        }
    }

    checkbox.addEventListener("change", toggleEmailField);

    toggleEmailField();
});
</script>

</body>
</html>
